<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PremiumWeb</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0d0d;
            --paper: #f5f0e8;
            --cream: #ede8dc;
            --accent: #c84b2f;
            --accent2: #2563eb;
            --muted: #7a7265;
            --line: rgba(13,13,13,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 64px;
            border-bottom: 1px solid var(--line);
            background: var(--paper);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--ink);
            letter-spacing: -0.3px;
        }
        .brand span { color: var(--accent); }

        .logout-form { margin: 0; }
        .logout-btn {
            padding: 10px 24px;
            background: transparent;
            border: 1.5px solid var(--ink);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .logout-btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        /* MAIN CONTENT */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 72px 40px 96px;
            animation: fadeUp 0.7s ease 0.1s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 64px;
            padding-bottom: 48px;
            border-bottom: 1px solid var(--line);
            gap: 32px;
        }
        .hero-text {}
        .hero-eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hero-eyebrow::before {
            content: '';
            display: inline-block;
            width: 28px;
            height: 1px;
            background: var(--accent);
        }
        .hero-name {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(40px, 5vw, 64px);
            line-height: 1.05;
            color: var(--ink);
            letter-spacing: -1px;
        }
        .hero-name em {
            font-style: italic;
            color: var(--accent);
        }
        .hero-sub {
            font-size: 16px;
            color: var(--muted);
            margin-top: 16px;
            font-weight: 300;
        }

        /* Avatar */
        .avatar-wrap {
            flex-shrink: 0;
        }
        .avatar {
            width: 96px; height: 96px;
            border-radius: 50%;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 36px;
            color: var(--paper);
            position: relative;
        }
        .avatar::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px dashed rgba(13,13,13,0.2);
        }

        /* INFO GRID */
        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 24px;
            font-weight: 500;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
        }
        .info-block {
            background: var(--paper);
            padding: 32px 36px;
            transition: background 0.2s;
        }
        .info-block:hover { background: var(--cream); }
        .info-block.full-width { grid-column: 1 / -1; }
        .info-block-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .info-block-value {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: var(--ink);
            line-height: 1.2;
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--cream);
            border: 1px solid var(--line);
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 48px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }

        @media (max-width: 640px) {
            .topbar { padding: 20px 24px; }
            .main { padding: 48px 24px; }
            .hero { flex-direction: column-reverse; align-items: flex-start; }
            .info-grid { grid-template-columns: 1fr; }
            .info-block.full-width { grid-column: 1; }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <div class="brand">Premium<span>.</span></div>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </nav>

    <main class="main">
        <div class="hero">
            <div class="hero-text">
                <div class="hero-eyebrow">Welcome back</div>
                <div class="hero-name">
                    Hello,<br>
                    <em th:text="${profile != null ? profile.nama : 'User'}">User</em>
                </div>
                <p class="hero-sub">Here's your profile information.</p>
            </div>
            <div class="avatar-wrap">
                <div class="avatar"
                    th:text="${profile != null and profile.nama != null and !profile.nama.isEmpty() ? #strings.substring(profile.nama, 0, 1) : 'U'}">
                    U
                </div>
            </div>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            Account active
        </div>

        <div class="section-label">Profile details</div>
        <div class="info-grid">
            <div class="info-block">
                <div class="info-block-label">Username</div>
                <div class="info-block-value" th:text="${user != null ? user.username : '—'}">username</div>
            </div>
            <div class="info-block">
                <div class="info-block-label">Full Name</div>
                <div class="info-block-value" th:text="${profile != null ? profile.nama : '—'}">Full Name</div>
            </div>
            <div class="info-block full-width">
                <div class="info-block-label">Address</div>
                <div class="info-block-value" style="font-size: 20px; font-family: 'DM Sans', sans-serif; font-weight: 300;" th:text="${profile != null ? profile.alamat : '—'}">Your address here</div>
            </div>
        </div>
    </main>
</body>
</html>
